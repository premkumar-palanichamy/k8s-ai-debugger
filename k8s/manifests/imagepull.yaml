# Scenario 2: ImagePullBackOff
# Uses a non-existent image tag
apiVersion: apps/v1
kind: Deployment
metadata:
  name: test-imagepull
  namespace: default
  labels:
    scenario: imagepull
spec:
  replicas: 1
  selector:
    matchLabels:
      app: test-imagepull
  template:
    metadata:
      labels:
        app: test-imagepull
    spec:
      containers:
      - name: app
        image: nginx:this-tag-does-not-exist-99999
        resources:
          requests:
            memory: "32Mi"
            cpu: "50m"
          limits:
            memory: "64Mi"
            cpu: "100m"
