# Scenario 1: CrashLoopBackOff
# Container exits immediately with error code 1
apiVersion: apps/v1
kind: Deployment
metadata:
  name: test-crashloop
  namespace: default
  labels:
    scenario: crashloop
spec:
  replicas: 1
  selector:
    matchLabels:
      app: test-crashloop
  template:
    metadata:
      labels:
        app: test-crashloop
    spec:
      containers:
      - name: app
        image: busybox:latest
        command: ["sh", "-c", "echo starting && exit 1"]
        resources:
          requests:
            memory: "32Mi"
            cpu: "50m"
          limits:
            memory: "64Mi"
            cpu: "100m"
